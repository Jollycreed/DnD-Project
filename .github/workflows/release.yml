name: Build Release Packages

permissions:
  contents: write
  packages: write

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [ main ] # Almeno vedi se funziona ad ogni push senza fare release finte!

jobs:
  linux:
    name: Build Linux package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Linux binary
        run: gcc -o dnd_game main.c -Wall -std=c99 -O2
        
      - name: Package Linux
        run: |
          mkdir -p release/linux
          cp main.c README.md start.sh start_linux.sh Dockerfile build_docker.sh run_game.sh .dockerignore release/linux/ || true
          cp dnd_game release/linux/ || true
          tar -czf dnd-game-linux.tar.gz -C release/linux .
          
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnd-game-linux
          path: dnd-game-linux.tar.gz

      - name: Upload Linux release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dnd-game-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Build Windows package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install MSYS2 and GCC
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc
          
      - name: Build Windows binary
        shell: msys2 {0} # Forza l'ambiente MSYS2 puro per evitare problemi di path
        run: gcc -o dnd_game.exe main.c -Wall -std=c99 -O2
        
      - name: Package Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/windows | Out-Null
          
          # Controllo se i file esistono prima di copiarli, così non crasha se ne manca uno
          $filesToCopy = @("main.c", "README.md", "start_windows.bat", "build_windows.sh", "run_game.sh", ".dockerignore")
          foreach ($file in $filesToCopy) {
              if (Test-Path $file) {
                  Copy-Item $file -Destination release/windows/ -Force
              }
          }
          
          if (Test-Path "dnd_game.exe") {
              Copy-Item dnd_game.exe -Destination release/windows/ -Force
          } else {
              Write-Error "ERRORE CRITICO: dnd_game.exe non è stato compilato!"
              exit 1
          }
          
          Compress-Archive -Path release/windows/* -DestinationPath dnd-game-windows.zip -Force
          
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnd-game-windows
          path: dnd-game-windows.zip

      - name: Upload Windows release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dnd-game-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    name: Build macOS package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build macOS binary
        run: clang -o dnd_game main.c -Wall -std=c99 -O2
        
      - name: Package macOS
        run: |
          mkdir -p release/macos
          cp main.c README.md start_macos.sh Dockerfile build_docker.sh run_game.sh .dockerignore release/macos/ || true
          cp dnd_game release/macos/ || true
          cd release/macos
          zip -r ../../dnd-game-macos.zip .
          
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnd-game-macos
          path: dnd-game-macos.zip

      - name: Upload macOS release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dnd-game-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}